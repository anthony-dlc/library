<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Library</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="./library.js" defer></script>
  </head>
  <body>
    <h1>Your library</h1>
    <button type="button" class="call-form">Add New Book</button>
    <div class="books-container">

          <svg class="father-svg" style="display: none;">
            <svg id="book-icon" viewBox="0 0 24 24">
              <path d="M12 21.5C10.65 20.65 8.2 20 6.5 20C4.85 20 3.15 20.3 1.75 21.05C1.65 21.1 1.6 21.1 1.5 21.1C1.25 21.1 1 20.85 1 20.6V6C1.6 5.55 2.25 5.25 3 5C4.11 4.65 5.33 4.5 6.5 4.5C8.45 4.5 10.55 4.9 12 6C13.45 4.9 15.55 4.5 17.5 4.5C18.67 4.5 19.89 4.65 21 5C21.75 5.25 22.4 5.55 23 6V20.6C23 20.85 22.75 21.1 22.5 21.1C22.4 21.1 22.35 21.1 22.25 21.05C20.85 20.3 19.15 20 17.5 20C15.8 20 13.35 20.65 12 21.5M12 8V19.5C13.35 18.65 15.8 18 17.5 18C18.7 18 19.9 18.15 21 18.5V7C19.9 6.65 18.7 6.5 17.5 6.5C15.8 6.5 13.35 7.15 12 8M13 11.5C14.11 10.82 15.6 10.5 17.5 10.5C18.41 10.5 19.26 10.59 20 10.78V9.23C19.13 9.08 18.29 9 17.5 9C15.73 9 14.23 9.28 13 9.84V11.5M17.5 11.67C15.79 11.67 14.29 11.93 13 12.46V14.15C14.11 13.5 15.6 13.16 17.5 13.16C18.54 13.16 19.38 13.24 20 13.4V11.9C19.13 11.74 18.29 11.67 17.5 11.67M20 14.57C19.13 14.41 18.29 14.33 17.5 14.33C15.67 14.33 14.17 14.6 13 15.13V16.82C14.11 16.16 15.6 15.83 17.5 15.83C18.54 15.83 19.38 15.91 20 16.07V14.57Z" 
                    fill="var(--color-icono, #000)" />
            </svg>
          </svg>

      </div>
      
    </div>
    <div class="form-container">
      <form action="#" method="#">
        <a href="#" class="close-form"><svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          class="close-form"><title>close</title>
          <path
            d="M19,6.41L17.59,5L12,10.59L6.41,5L5,6.41L10.59,12L5,17.59L6.41,19L12,13.41L17.59,19L19,17.59L13.41,12L19,6.41Z"
          />
        </svg></a>
          
        <h2>Add a New Book</h2>
        <div class="book-info">
          <label for="book-author">Author</label>
          <input
            type="text"
            name="author"
            id="book-author"
            placeholder="Ej: James Clear"
            required
          />
        </div>
        <div class="book-info">
          <label for="book-title">Title</label>
          <input
            type="text"
            name="title"
            id="book-title"
            placeholder="Ej: Atomic Habits"
            required
          />
        </div>
        <div class="book-info">
          <label for="book-pages">Pages</label>
          <input
            type="number"
            name="pages"
            id="book-pages"
            placeholder="Ej: 320"
            required
          />
        </div>
        <fieldset>
          <legend>Did you read the book?</legend>
          <label for="yes">
            Yes, I did
            <input
              type="radio"
              name="book-status"
              class="book-status"
              id="yes"
              value="Read it"
              checked
            />
          </label>
          <label for="no">
            No, I didn't
            <input
              type="radio"
              name="book-status"
              class="book-status"
              id="no"
              value="Not read it"
            />
          </label>
        </fieldset>
        <button type="button" class="create-book">Add Book</button>
      </form>
    </div>
  </body>
</html>
