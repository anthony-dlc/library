<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Library</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="./library.js" defer></script>
  </head>
  <body>
    <h1>Your library</h1>
    <button type="button" class="call-form">Add New Book</button>
    <div class="books-container">
      <ul class="list-of-books">
        <li class="book">Hello</li>
      </ul>
    </div>
    <div class="form-container">
      <form action="#" method="#">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          class="close-form"
        >
          <title>close</title>
          <path
            d="M19,6.41L17.59,5L12,10.59L6.41,5L5,6.41L10.59,12L5,17.59L6.41,19L12,13.41L17.59,19L19,17.59L13.41,12L19,6.41Z"
          />
        </svg>
        <h2>Add a New Book</h2>
        <div class="book-info">
          <label for="book-author">Author</label>
          <input
            type="text"
            name="author"
            id="book-author"
            placeholder="Ej: James Clear"
            required
          />
        </div>
        <div class="book-info">
          <label for="book-title">Title</label>
          <input
            type="text"
            name="title"
            id="book-title"
            placeholder="Ej: Atomic Habits"
            required
          />
        </div>
        <div class="book-info">
          <label for="book-pages">Pages</label>
          <input
            type="number"
            name="pages"
            id="book-pages"
            placeholder="Ej: 320"
            required
          />
        </div>
        <fieldset>
          <legend>Did you read the book?</legend>
          <label for="yes">
            Yes, I did
            <input
              type="radio"
              name="book-read"
              class="book-read"
              id="yes"
              value="yes"
              checked
            />
          </label>
          <label for="no">
            No, I didn't
            <input
              type="radio"
              name="book-read"
              class="book-read"
              id="no"
              value="no"
            />
          </label>
        </fieldset>
        <button type="button" class="add-book">Add Book</button>
      </form>
    </div>
  </body>
</html>
